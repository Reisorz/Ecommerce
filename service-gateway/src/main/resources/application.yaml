spring:
  application:
    name: service-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: product-service
              uri: http://service-product:8081
              predicates:
                - Path=/api/v1/products/**

            - id: user-service
              uri: http://service-user:8082
              predicates:
                - Path=/api/v1/users/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, gateway